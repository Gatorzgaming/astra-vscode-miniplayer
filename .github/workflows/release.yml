name: Build and Release VSIX

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        if: steps.tag.outputs.should_release == 'true'
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.tag.outputs.should_release == 'true'
        run: npm ci

      - name: Compile extension
        if: steps.tag.outputs.should_release == 'true'
        run: npm run compile

      - name: Package VSIX
        if: steps.tag.outputs.should_release == 'true'
        run: npx @vscode/vsce package --no-yarn

      - name: Upload VSIX artifact
        if: steps.tag.outputs.should_release == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: vsix-${{ steps.tag.outputs.tag }}
          path: "*.vsix"

      - name: Create GitHub release
        if: steps.tag.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: "*.vsix"

      - name: Skip notice
        if: steps.tag.outputs.should_release != 'true'
        run: echo "Release skipped because tag ${{ steps.tag.outputs.tag }} already exists."